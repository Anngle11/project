<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>الرئيسية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">

    <style>
        .hero h1, .hero p, #startBtn {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo">
        <video class="video-background" autoplay muted loop>
            <source src="img-ved/saudi.mp4" type="video/mp4">
        </video>
        <img src="img-ved/camel.JPG"/>
    </div>

    <nav>
        <a href="MainPage.html">الرئيسية</a>
        <a href="About.html">من نحن</a>
        <a href="Services.html">خدماتنا</a>
        <a href="contact.html">تواصل</a>
    </nav>
</header>

<main>
    <section class="section">
        <section class="hero">
            <div>
                <h1 id="mainTitle">اختبر معلوماتك عن السعودية</h1>
                <p id="welcomeMessage">مرحباً بك في لعبة Saudi Quiz</p>
                <a href="questions.html" class="btn" id="startBtn">ابدأ اللعبة</a>

                <!-- هنا بنضيف عنصر ديناميكي -->
                <div id="dynamicArea"></div>
            </div>
        </section>
    </section>
</main>

<footer class="footer">
    <p>© 2026 Saudi Quiz</p>
    <a href="https://x.com/joudalghamdi26?s=21" target="_blank"><img src="img-ved/x.jpg"/></a>
    <a href="https://www.linkedin.com/in/joud-alghamdi-8aa7a03a9" target="_blank"><img src="img-ved/in.jpg"/></a>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const heroTitle = document.getElementById("mainTitle");
    const heroMsg = document.getElementById("welcomeMessage");
    const startBtn = document.getElementById("startBtn");
    const dynamicArea = document.getElementById("dynamicArea");

    // == 1) Dynamic content animation ==
    setTimeout(()=> heroTitle.classList.add("show"), 200);
    setTimeout(()=> heroMsg.classList.add("show"), 500);
    setTimeout(()=> startBtn.classList.add("show"), 800);

    // == 2) Create dynamic element ==
    const infoBox = document.createElement("p");
    infoBox.textContent = "💡 هل أنت مستعد لاختبار معلوماتك؟";
    infoBox.style.marginTop = "5px";
    infoBox.style.fontWeight = "bold";
    infoBox.style.color = "#A96F43";
    dynamicArea.appendChild(infoBox);

    // == 3) Event Handling ==
    startBtn.addEventListener("click", function(e){
        e.preventDefault();

        heroTitle.textContent = "استعد للتحدي 🔥";
        heroMsg.textContent = "جاري الانتقال للعبة...";
        startBtn.style.transform = "scale(1.2)";
        infoBox.remove(); // حذف عنصر ديناميكي

        setTimeout(() => {
            window.location.href = "questions.html";
        }, 1000);
    });

    // == 4) Hover Effect ==
    startBtn.addEventListener("mouseover", function(){
        startBtn.style.boxShadow = "0 0 20px rgba(212,139,84,0.7)";
    });

    startBtn.addEventListener("mouseout", function(){
        startBtn.style.boxShadow = "none";
    });

    // == 5) Scroll Event Example ==
    window.addEventListener("scroll", function(){
        if (window.scrollY > 50) {
            document.querySelector(".navbar").style.background = "#A96F43";
        } else {
            document.querySelector(".navbar").style.background = "#D48B54";
        }
    });

});
</script>

</body>
</html>
