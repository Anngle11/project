<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Saudi Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <img src="img-ved/camel.JPG"/>
    </div>
    <nav>
        <a href="MainPage.html">الرئيسية</a>
        <a href="About.html">من نحن</a>
        <a href="Services.html">خدماتنا</a>
        <a href="Contact.html">تواصل</a>
    </nav>
</header>

<main>

<section id="quiz2" class="page quiz active">
    <h2>متى اليوم الوطني السعودي؟</h2>
    <div class="options">
        <a href="#wrong">23 يناير</a>
        <a href="#wrong">23 مايو</a>
        <a href="questions3.html">23 سبتمبر</a>
    </div>
</section>

</main>

<footer class="footer">
    <p>© 2026 Saudi Quiz</p>
</footer>

<div id="wrong" class="popup">
    <div class="popup-box">
        <h3>❌ إجابة خاطئة</h3>
        <a href="#quiz2" class="close">إغلاق</a>
    </div>
</div>

<div id="correct" class="popup">
    <div class="popup-box">
        <h3>✅ إجابة صحيحة</h3>
        <a href="questions3.html" class="close">التالي</a>
    </div>
</div>

<!-- == JavaScript == -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    const options = document.querySelectorAll("#quiz2 .options a");
    const correctPopup = document.getElementById("correct");
    const wrongPopup = document.getElementById("wrong");

    options.forEach(option => {
        option.addEventListener("click", function(e){
            // إذا الرابط صحيح (الانتقال للصفحة التالية)
            if(option.getAttribute("href") === "questions3.html") {
                e.preventDefault();
                correctPopup.style.display = "flex";
                setTimeout(() => {
                    window.location.href = "questions3.html";
                }, 1000); // تأخير 1 ثانية قبل الانتقال
            } else {
                e.preventDefault();
                wrongPopup.style.display = "flex";
            }
        });
    });

    // زر إغلاق popup
    document.querySelectorAll(".popup .close").forEach(btn => {
        btn.addEventListener("click", function(e){
            e.preventDefault();
            this.closest(".popup").style.display = "none";
        });
    });

});
</script>

</body>
</html>
