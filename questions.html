<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Saudi Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <img src="img-ved/camel.JPG"/>
    </div>
    <nav>
        <a href="MainPage.html">الرئيسية</a>
        <a href="About.html">من نحن</a>
        <a href="Services.html">خدماتنا</a>
        <a href="Contact.html">تواصل</a>
    </nav>
</header>

<main>
<section id="quiz1" class="page quiz active">
    <h2>ما هي عاصمة المملكة العربية السعودية؟</h2>
    <div class="options">
        <a href="#" class="option wrong">جدة</a>
        <a href="#" class="option correct">الرياض</a>
        <a href="#" class="option wrong">مكة</a>
    </div>
</section>
</main>

<footer class="footer">
    <p>© 2026 Saudi Quiz</p>
</footer>

<!-- Popups -->
<div id="popup" class="popup">
    <div class="popup-box">
        <h3 id="popupMessage"></h3>
        <a href="#" id="popupClose" class="close">إغلاق</a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const options = document.querySelectorAll('.option');
    const popup = document.getElementById('popup');
    const popupMessage = document.getElementById('popupMessage');
    const popupClose = document.getElementById('popupClose');

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.preventDefault();
            if(option.classList.contains('correct')) {
                popupMessage.textContent = "✅ إجابة صحيحة!";
                popupClose.href = "questions2.html"; // الانتقال للسؤال التالي
            } else {
                popupMessage.textContent = "❌ إجابة خاطئة";
                popupClose.href = "#quiz1"; // الرجوع للسؤال نفسه
            }
            popup.style.display = "flex";
        });
    });

    popupClose.addEventListener('click', function(e){
        popup.style.display = "none";
    });
});
</script>

</body>
</html>
